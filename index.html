<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>仮面ライダークイズ</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', Arial, sans-serif;
    color: white;
    text-align: center;
    background: black;
    overflow-y: auto;
    padding: 20px 10px;
}

/* 背景エネルギー */
.energy-bg {
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at center, red 0%, black 60%);
    animation: pulse 3s infinite alternate;
    z-index: 0;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(1.2); opacity: 1; }
}

/* 回転リング */
.ring {
    position: fixed;
    width: 200px;
    height: 200px;
    border: 4px solid red;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: spin 3s linear infinite;
    box-shadow: 0 0 25px red;
    z-index: 1;
}

@keyframes spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* ヒーローシルエット */
.hero {
    position: fixed;
    width: 80px;
    height: 140px;
    background: white;
    clip-path: polygon(50% 0%, 70% 20%, 60% 40%, 80% 70%, 50% 100%, 20% 70%, 40% 40%, 30% 20%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    animation: appear 2s forwards;
    z-index: 2;
}

@keyframes appear {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* フラッシュ */
.flash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: white;
    opacity: 0;
    animation: flashAnim 2s forwards;
    z-index: 3;
}

@keyframes flashAnim {
    0% { opacity: 0; }
    50% { opacity: 0.8; }
    100% { opacity: 0; }
}

/* クイズ部分 */
.quiz-box {
    position: relative;
    z-index: 5;
    display: none;
    max-width: 500px;
    margin: 0 auto;
    padding: 10px;
}

/* タイトル */
.quiz-box h2 {
    font-size: 1.6em;
    text-shadow: 0 0 8px yellow, 0 0 16px red;
    margin-bottom: 25px;
}

/* 選択肢ボタン */
.option {
    cursor: pointer;
    border: 3px solid red;
    border-radius: 15px;
    padding: 15px;
    margin: 15px auto;
    width: 90%;
    max-width: 400px;
    background: linear-gradient(45deg, rgba(0,0,0,0.8), rgba(50,0,0,0.8));
    transition: 0.3s;
    box-shadow: 0 0 8px red, 0 0 15px orange;
    color: white;
    font-weight: bold;
    font-size: 1em;
    text-shadow: 0 0 3px yellow;
}

.option:hover {
    background: linear-gradient(45deg, rgba(255,0,0,0.8), rgba(255,100,0,0.9));
    transform: scale(1.03);
    box-shadow: 0 0 15px yellow, 0 0 20px orange;
}

/* 選択肢画像 */
.option img {
    width: 80%;
    max-width: 180px;
    height: auto;
    object-fit: contain;
    margin-bottom: 8px;
}

/* 正解エフェクト */
#effect {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, yellow, red, black);
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 50px;
    font-weight: bold;
    color: yellow;
    text-shadow: 0 0 15px red, 0 0 30px orange;
    animation: explode 1.5s ease-out forwards;
    z-index: 10;
}

@keyframes explode {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
}

/* メディアクエリでさらにスマホ向け調整 */
@media screen and (max-width: 400px) {
    .quiz-box h2 {
        font-size: 1.3em;
        margin-bottom: 15px;
    }
    .option {
        padding: 12px;
        font-size: 0.95em;
    }
    .option img {
        max-width: 140px;
    }
    .ring {
        width: 150px;
        height: 150px;
    }
    .hero {
        width: 60px;
        height: 100px;
    }
    #effect {
        font-size: 40px;
    }
}
</style>
</head>

<body>

<div class="energy-bg"></div>
<div class="ring"></div>
<div class="hero"></div>
<div class="flash"></div>

<div id="effect">COMPLETE!!</div>

<div class="quiz-box" id="quiz">
    <h2>はじめまして！咲苗ちゃん</h2>
    <h2>いきなりですが、クイズです！</h2>
    <h2>2022年の仮面ライダーの名前はどれでしょう？</h2>

    <div class="option" onclick="checkAnswer(false)">
        <img src="images/revice.jpg" alt="リバイス">
        <p>仮面ライダーリバイス</p>
    </div>

    <div class="option" onclick="checkAnswer(false)">
        <img src="images/saber.jpg" alt="セイバー">
        <p>仮面ライダーセイバー</p>
    </div>

    <div class="option" onclick="checkAnswer(true)">
        <img src="images/geats.jpg" alt="ギーツ">
        <p>仮面ライダーギーツ</p>
    </div>
</div>

<script>
// 変身演出後にクイズ表示
setTimeout(() => {
    document.getElementById("quiz").style.display = "block";
}, 2500);

function checkAnswer(isCorrect) {
    if (isCorrect) {
        const effect = document.getElementById("effect");
        effect.style.display = "flex";

        setTimeout(() => {
            window.location.href = "success.html";
        }, 1500);

    } else {
        alert("不正解！もう一度挑戦してね！");
    }
}
</script>

</body>
</html>
